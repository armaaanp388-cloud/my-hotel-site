<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Indigo Inn - Luxury Stays</title>
    <!-- Premium Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #e0e0e0; }
        h1, h2 { font-family: 'Playfair Display', serif; color: #d4af37; } /* Royal Gold */
        
        .hero { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('37793.jpg'); background-size: cover; background-position: center; text-align: center; }
        
        .btn { padding: 18px 45px; border: 2px solid #d4af37; color: #d4af37; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; }
        .btn:hover { background: #d4af37; color: #000; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 10px; padding: 20px; }
        .gallery img { width: 100%; height: 350px; object-fit: cover; border: 1px solid #222; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Hotel Indigo Inn</h1>
        <p>Experience Absolute Elegance in Khargone</p>
        <a href="https://wa.me/919425415559" class="btn">Book Your Stay</a>
    </div>

    <h2 style="text-align:center; margin-top:50px;">Our Premium Spaces</h2>
    <div class="gallery">
        <img src="37783.jpg" alt="Interior">
        <img src="37784.jpg" alt="Room">
        <img src="37785.jpg" alt="Bar">
        <img src="37786.jpg" alt="Dining">
        <img src="37787.jpg" alt="Ambience">
        <img src="37788.jpg" alt="Food">
        <img src="37790.jpg" alt="View">
        <img src="37791.jpg" alt="Luxury">
        <img src="37792.jpg" alt="Exterior">
    </div>

</body>
</html>
