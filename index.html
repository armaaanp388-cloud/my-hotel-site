<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Indigo Inn - Khargone</title>
    <!-- CSS for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background-color: #0d6efd; color: white; padding: 60px 20px; text-align: center; }
        .gallery-img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="hero-section">
        <h1>Hotel Indigo Inn</h1>
        <p>Comfort and luxury in the heart of Khargone</p>
        <a href="https://wa.me/919425415559" class="btn btn-light btn-lg">Book Now on WhatsApp</a>
    </div>

    <!-- Gallery -->
    <div class="container mt-5">
        <h2 class="text-center mb-4">Our Gallery</h2>
        <div class="row">
            <div class="col-12 col-md-4">
                <img src="screenshot1.jpg" class="gallery-img" alt="Hotel Photo">
            </div>
            <div class="col-12 col-md-4">
                <img src="screenshot2.jpg" class="gallery-img" alt="Hotel Photo">
            </div>
            <div class="col-12 col-md-4">
                <img src="screenshot3.jpg" class="gallery-img" alt="Hotel Photo">
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center mt-5 p-4 bg-light">
        <p>Location: Khandwa Road, Khargone, Madhya Pradesh</p>
        <p>&copy; 2026 Hotel Indigo Inn</p>
    </footer>

</body>
</html>
